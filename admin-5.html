<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت | مهراد فیت فود</title>
<style>
@font-face { font-family: 'Vazirmatn'; font-weight: 400; src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn-Regular.woff2') format('woff2'); }
@font-face { font-family: 'Vazirmatn'; font-weight: 600; src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn-SemiBold.woff2') format('woff2'); }
@font-face { font-family: 'Vazirmatn'; font-weight: 700; src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn-Bold.woff2') format('woff2'); }
@font-face { font-family: 'Vazirmatn'; font-weight: 800; src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn-ExtraBold.woff2') format('woff2'); }
</style>
<style>
  :root {
    --green-deep: #1a5e35;
    --green-mid: #2d8a52;
    --green-light: #4ab870;
    --green-pale: #e8f5ee;
    --green-accent: #00c853;
    --white: #ffffff;
    --off-white: #f4faf6;
    --text-dark: #0f2d1a;
    --text-light: #5a7a63;
    --danger: #e53935;
    --danger-pale: #ffeaea;
    --shadow: 0 2px 16px rgba(26,94,53,0.1);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Vazirmatn', Tahoma, Arial, sans-serif; background: var(--off-white); color: var(--text-dark); direction: rtl; min-height: 100vh; }

  /* LOGIN SCREEN */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
    padding: 20px;
  }

  .login-box {
    background: var(--white);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    text-align: center;
  }

  .login-logo {
    font-size: 52px;
    margin-bottom: 16px;
  }

  .login-box h2 {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--green-deep);
    margin-bottom: 6px;
  }

  .login-box p {
    color: var(--text-light);
    font-size: 0.85rem;
    margin-bottom: 32px;
  }

  .input-group {
    margin-bottom: 18px;
    text-align: right;
  }

  .input-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 7px;
  }

  .input-group input {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #d0e8d8;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus { border-color: var(--green-mid); }

  .btn-login {
    width: 100%;
    background: var(--green-deep);
    color: var(--white);
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }

  .btn-login:hover { background: var(--green-mid); }

  .login-error {
    color: var(--danger);
    font-size: 0.82rem;
    margin-top: 12px;
    display: none;
  }

  /* ADMIN PANEL */
  #adminPanel { display: none; }

  .admin-header {
    background: var(--green-deep);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .admin-header h1 {
    color: var(--white);
    font-size: 1.1rem;
    font-weight: 800;
  }

  .admin-header-actions { display: flex; gap: 12px; }

  .btn-small {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
    transition: opacity 0.2s;
  }

  .btn-small:hover { opacity: 0.85; }
  .btn-outline { background: rgba(255,255,255,0.15); color: var(--white); border: 1px solid rgba(255,255,255,0.3); }
  .btn-accent { background: var(--green-accent); color: var(--green-deep); }
  .btn-danger { background: var(--danger); color: var(--white); }

  .admin-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .stat-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 22px 20px;
    box-shadow: var(--shadow);
    border-right: 4px solid var(--green-light);
  }

  .stat-card .stat-value {
    font-size: 2rem;
    font-weight: 800;
    color: var(--green-deep);
  }

  .stat-card .stat-label {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* ADD FOOD FORM */
  .panel-section {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 28px;
    overflow: hidden;
  }

  .panel-section-header {
    background: var(--green-pale);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-section-header h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--green-deep);
  }

  .panel-section-body { padding: 24px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-dark);
  }

  .form-group input, .form-group select, .form-group textarea {
    padding: 11px 14px;
    border: 1.5px solid #d0e8d8;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
    outline: none;
    transition: border-color 0.2s;
    background: #fafcfb;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--green-mid);
    background: var(--white);
  }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .macros-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px;
    background: var(--green-pale);
    border-radius: 10px;
    margin-top: 4px;
  }

  .btn-save {
    width: 100%;
    background: var(--green-deep);
    color: var(--white);
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s;
  }

  .btn-save:hover { background: var(--green-mid); }

  /* FOODS TABLE */
  .foods-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .foods-table th {
    background: var(--green-pale);
    color: var(--green-deep);
    padding: 12px 16px;
    text-align: right;
    font-weight: 700;
    font-size: 0.8rem;
  }

  .foods-table td {
    padding: 14px 16px;
    border-bottom: 1px solid #edf5f0;
    vertical-align: middle;
  }

  .foods-table tr:hover td { background: #f7fbf8; }

  .food-name-cell { font-weight: 700; font-size: 0.95rem; }
  .food-cat-badge {
    display: inline-block;
    background: var(--green-pale);
    color: var(--green-deep);
    padding: 3px 12px;
    border-radius: 50px;
    font-size: 0.72rem;
    font-weight: 600;
  }

  .macro-pill {
    display: inline-block;
    background: #f0f8f3;
    color: var(--text-light);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    margin: 1px;
  }

  .action-btns { display: flex; gap: 8px; }

  .btn-edit {
    background: var(--green-pale);
    color: var(--green-deep);
    border: 1px solid #b8ddc6;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
  }

  .btn-del {
    background: var(--danger-pale);
    color: var(--danger);
    border: 1px solid #f5c6c6;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green-deep);
    color: var(--white);
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    transition: transform 0.3s;
    z-index: 9999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 580px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h3 {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--green-deep);
    margin-bottom: 24px;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn-modal-save {
    flex: 1;
    background: var(--green-deep);
    color: var(--white);
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
  }

  .btn-modal-cancel {
    flex: 1;
    background: #f0f4f2;
    color: var(--text-dark);
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
  }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .macros-grid { grid-template-columns: 1fr 1fr; }
    .foods-table { font-size: 0.75rem; }
    .foods-table th, .foods-table td { padding: 10px 8px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <h2>پنل مدیریت</h2>
    <p>مهراد فیت فود</p>
    <div class="input-group">
      <label>نام کاربری</label>
      <input type="text" id="loginUser" placeholder="admin" value="">
    </div>
    <div class="input-group">
      <label>رمز عبور</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">ورود به پنل</button>
    <div class="login-error" id="loginError">نام کاربری یا رمز عبور اشتباه است</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <h1>🥗 پنل مدیریت مهراد فیت فود</h1>
    <div class="admin-header-actions">
      <button class="btn-small btn-outline" onclick="window.open('index.html','_blank')">👁 مشاهده سایت</button>
      <button class="btn-small btn-accent" onclick="exportIndex()" style="background:#00c853;color:#0f2d1a;font-weight:800;">⬇️ خروجی index.html</button>
      <button class="btn-small btn-outline" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">تعداد آیتم‌های منو</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statCats">0</div>
        <div class="stat-label">دسته‌بندی‌ها</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statWithPrice">0</div>
        <div class="stat-label">آیتم با قیمت</div>
      </div>
    </div>

    <!-- ADD FOOD -->
    <div class="panel-section">
      <div class="panel-section-header">
        <h3>➕ افزودن آیتم جدید</h3>
      </div>
      <div class="panel-section-body">
        <div class="form-grid">
          <div class="form-group">
            <label>نام غذا *</label>
            <input type="text" id="newName" placeholder="مثلاً: کته مرغ">
          </div>
          <div class="form-group">
            <label>دسته‌بندی *</label>
            <select id="newCat">
              <option value="برنج">🍚 برنج و کته</option>
              <option value="سالاد">🥗 سالاد</option>
              <option value="ماکارانی">🍝 ماکارانی</option>
              <option value="برگر">🍔 برگر</option>
              <option value="پیشنهاد">⭐ پیشنهاد ویژه</option>
              <option value="پروتئین">💪 پروتئین</option>
            </select>
          </div>
          <div class="form-group">
            <label>ایموجی</label>
            <input type="text" id="newEmoji" placeholder="🍚" maxlength="4">
          </div>
          <div class="form-group">
            <label>قیمت (تومان) — خالی = تماس بگیرید</label>
            <input type="number" id="newPrice" placeholder="250000">
          </div>
          <div class="form-group full">
            <label>توضیحات مواد غذایی *</label>
            <textarea id="newDesc" placeholder="مثلاً: ۲۵۰ گرم کته سبزی + مرغ زعفرانی + دورچین"></textarea>
          </div>
          <div class="form-group full">
            <label>لینک عکس (اختیاری)</label>
            <input type="text" id="newImage" placeholder="https://example.com/food.jpg">
          </div>
          <div class="form-group full">
            <label>اطلاعات تغذیه‌ای</label>
            <div class="macros-grid">
              <div class="form-group">
                <label>کالری (kcal)</label>
                <input type="number" id="newCal" placeholder="400">
              </div>
              <div class="form-group">
                <label>پروتئین (g)</label>
                <input type="number" id="newProtein" placeholder="30">
              </div>
              <div class="form-group">
                <label>کربوهیدرات (g)</label>
                <input type="number" id="newCarb" placeholder="45">
              </div>
              <div class="form-group">
                <label>چربی (g)</label>
                <input type="number" id="newFat" placeholder="8">
              </div>
            </div>
          </div>
        </div>
        <button class="btn-save" onclick="addFood()">✅ افزودن به منو</button>
      </div>
    </div>

    <!-- FOODS LIST -->
    <div class="panel-section">
      <div class="panel-section-header">
        <h3>📋 لیست آیتم‌های منو</h3>
        <button class="btn-small btn-danger" onclick="resetToDefault()" style="font-family:'Vazirmatn',Tahoma,Arial,sans-serif">بازنشانی</button>
      </div>
      <div class="panel-section-body" style="padding:0;overflow-x:auto">
        <table class="foods-table">
          <thead>
            <tr>
              <th>#</th>
              <th>نام</th>
              <th>دسته</th>
              <th>کالری</th>
              <th>ماکرو</th>
              <th>قیمت</th>
              <th>عملیات</th>
            </tr>
          </thead>
          <tbody id="foodsTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ ویرایش آیتم</h3>
    <input type="hidden" id="editId">
    <div class="form-grid">
      <div class="form-group">
        <label>نام غذا</label>
        <input type="text" id="editName">
      </div>
      <div class="form-group">
        <label>دسته‌بندی</label>
        <select id="editCat">
          <option value="برنج">🍚 برنج و کته</option>
          <option value="سالاد">🥗 سالاد</option>
          <option value="ماکارانی">🍝 ماکارانی</option>
          <option value="برگر">🍔 برگر</option>
          <option value="پیشنهاد">⭐ پیشنهاد ویژه</option>
          <option value="پروتئین">💪 پروتئین</option>
        </select>
      </div>
      <div class="form-group">
        <label>ایموجی</label>
        <input type="text" id="editEmoji" maxlength="4">
      </div>
      <div class="form-group">
        <label>قیمت (تومان)</label>
        <input type="number" id="editPrice">
      </div>
      <div class="form-group full">
        <label>توضیحات</label>
        <textarea id="editDesc"></textarea>
      </div>
      <div class="form-group full">
        <label>لینک عکس</label>
        <input type="text" id="editImage">
      </div>
      <div class="form-group full">
        <div class="macros-grid">
          <div class="form-group">
            <label>کالری</label>
            <input type="number" id="editCal">
          </div>
          <div class="form-group">
            <label>پروتئین</label>
            <input type="number" id="editProtein">
          </div>
          <div class="form-group">
            <label>کربوهیدرات</label>
            <input type="number" id="editCarb">
          </div>
          <div class="form-group">
            <label>چربی</label>
            <input type="number" id="editFat">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-save" onclick="saveEdit()">💾 ذخیره تغییرات</button>
      <button class="btn-modal-cancel" onclick="closeModal()">انصراف</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== AUTH ==========
const ADMIN_USER = 'mehrad';
const ADMIN_PASS = 'fitfood1403';

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderTable();
    updateStats();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

// ========== DATA ==========
const defaultFoods = [
  {id:1,name:"کته مرغ",category:"برنج",emoji:"🍚",desc:"۲۵۰ گرم کته سبزی + ۲۲۰ گرم مرغ زمزه‌دار شده زعفرانی + دورچین (زیتون · لیمو · جعفری) + سس انار دون",cal:480,protein:42,carb:55,fat:10,price:0,image:""},
  {id:2,name:"کته میتبال",category:"برنج",emoji:"🍚",desc:"۲۵۰ گرم کته سبزی + ۱۷۰ گرم گوشت خالص بدون چربی مزه‌دار شده + دورچین (زیتون · لیمو · جعفری · خیارشور)",cal:460,protein:38,carb:52,fat:9,price:0,image:""},

function loadFoods() {
  const s = localStorage.getItem('mff_foods');
  if (s) { try { return JSON.parse(s); } catch(e) {} }
  return JSON.parse(JSON.stringify(defaultFoods));
}

function saveFoods(foods) {
  localStorage.setItem('mff_foods', JSON.stringify(foods));
}

function resetToDefault() {
  if (confirm('آیا مطمئنید؟ تمام تغییرات پاک می‌شود.')) {
    saveFoods(JSON.parse(JSON.stringify(defaultFoods)));
    renderTable();
    updateStats();
    showToast('✅ منو به حالت اولیه بازگشت');
  }
}

// ========== ADD ==========
function addFood() {
  const name = document.getElementById('newName').value.trim();
  const desc = document.getElementById('newDesc').value.trim();
  if (!name || !desc) { showToast('❌ نام و توضیحات الزامی است'); return; }

  const foods = loadFoods();
  const newId = Math.max(0, ...foods.map(f => f.id)) + 1;
  foods.push({
    id: newId,
    name,
    category: document.getElementById('newCat').value,
    emoji: document.getElementById('newEmoji').value || '🍽️',
    desc,
    cal: parseInt(document.getElementById('newCal').value) || 0,
    protein: parseInt(document.getElementById('newProtein').value) || 0,
    carb: parseInt(document.getElementById('newCarb').value) || 0,
    fat: parseInt(document.getElementById('newFat').value) || 0,
    price: parseInt(document.getElementById('newPrice').value) || 0,
    image: document.getElementById('newImage').value.trim()
  });

  saveFoods(foods);
  renderTable();
  updateStats();
  clearAddForm();
  showToast('✅ آیتم با موفقیت اضافه شد');
}

function clearAddForm() {
  ['newName','newCat','newEmoji','newPrice','newDesc','newImage','newCal','newProtein','newCarb','newFat']
    .forEach(id => { const el = document.getElementById(id); if (el.tagName === 'SELECT') el.selectedIndex = 0; else el.value = ''; });
}

// ========== TABLE ==========
function renderTable() {
  const foods = loadFoods();
  const tbody = document.getElementById('foodsTableBody');
  tbody.innerHTML = '';
  foods.forEach((f, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:#aaa;font-size:0.8rem">${i+1}</td>
      <td class="food-name-cell">${f.emoji} ${f.name}</td>
      <td><span class="food-cat-badge">${f.category}</span></td>
      <td><strong>${f.cal}</strong> kcal</td>
      <td>
        <span class="macro-pill">P: ${f.protein}g</span>
        <span class="macro-pill">C: ${f.carb}g</span>
        <span class="macro-pill">F: ${f.fat}g</span>
      </td>
      <td>${f.price ? f.price.toLocaleString('fa-IR') + ' ت' : '—'}</td>
      <td>
        <div class="action-btns">
          <button class="btn-edit" onclick="openEdit(${f.id})">ویرایش</button>
          <button class="btn-del" onclick="deleteFood(${f.id})">حذف</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ========== EDIT ==========
function openEdit(id) {
  const foods = loadFoods();
  const f = foods.find(x => x.id === id);
  if (!f) return;
  document.getElementById('editId').value = f.id;
  document.getElementById('editName').value = f.name;
  document.getElementById('editCat').value = f.category;
  document.getElementById('editEmoji').value = f.emoji;
  document.getElementById('editPrice').value = f.price || '';
  document.getElementById('editDesc').value = f.desc;
  document.getElementById('editImage').value = f.image || '';
  document.getElementById('editCal').value = f.cal;
  document.getElementById('editProtein').value = f.protein;
  document.getElementById('editCarb').value = f.carb;
  document.getElementById('editFat').value = f.fat;
  document.getElementById('editModal').classList.add('open');
}

function saveEdit() {
  const id = parseInt(document.getElementById('editId').value);
  const foods = loadFoods();
  const idx = foods.findIndex(x => x.id === id);
  if (idx === -1) return;
  foods[idx] = {
    ...foods[idx],
    name: document.getElementById('editName').value.trim(),
    category: document.getElementById('editCat').value,
    emoji: document.getElementById('editEmoji').value || '🍽️',
    price: parseInt(document.getElementById('editPrice').value) || 0,
    desc: document.getElementById('editDesc').value.trim(),
    image: document.getElementById('editImage').value.trim(),
    cal: parseInt(document.getElementById('editCal').value) || 0,
    protein: parseInt(document.getElementById('editProtein').value) || 0,
    carb: parseInt(document.getElementById('editCarb').value) || 0,
    fat: parseInt(document.getElementById('editFat').value) || 0
  };
  saveFoods(foods);
  renderTable();
  updateStats();
  closeModal();
  showToast('✅ تغییرات ذخیره شد');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

// ========== DELETE ==========
function deleteFood(id) {
  if (!confirm('این آیتم حذف شود؟')) return;
  let foods = loadFoods();
  foods = foods.filter(f => f.id !== id);
  saveFoods(foods);
  renderTable();
  updateStats();
  showToast('🗑 آیتم حذف شد');
}

// ========== STATS ==========
function updateStats() {
  const foods = loadFoods();
  document.getElementById('statTotal').textContent = foods.length;
  document.getElementById('statCats').textContent = new Set(foods.map(f => f.category)).size;
  document.getElementById('statWithPrice').textContent = foods.filter(f => f.price > 0).length;
}

// ========== TOAST ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
