<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مهراد فیت فود | Mehrad Fit Food</title>
<style>
@font-face {
  font-family: 'Vazirmatn';
  font-weight: 400;
  src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'Vazirmatn';
  font-weight: 600;
  src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn-SemiBold.woff2') format('woff2');
}
@font-face {
  font-family: 'Vazirmatn';
  font-weight: 700;
  src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'Vazirmatn';
  font-weight: 800;
  src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn-ExtraBold.woff2') format('woff2');
}
:root {
  --gd: #1a5e35; --gm: #2d8a52; --gl: #4ab870;
  --gp: #e8f5ee; --ga: #00c853; --w: #fff;
  --ow: #f7faf8; --td: #0f2d1a; --tl: #5a7a63;
  --sh: 0 4px 24px rgba(26,94,53,.12);
  --shl: 0 8px 40px rgba(26,94,53,.18);
  --r: 18px; --rs: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Vazirmatn',Tahoma,Arial,sans-serif; background:var(--ow); color:var(--td); direction:rtl; }

/* HEADER */
header { background:var(--gd); position:sticky; top:0; z-index:100; box-shadow:0 2px 20px rgba(0,0,0,.2); }
.hi { max-width:1100px; margin:0 auto; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { width:48px; height:48px; background:var(--gl); border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:24px; }
.logo h1 { color:#fff; font-size:1.2rem; font-weight:800; line-height:1.2; }
.logo span { color:var(--ga); font-size:.72rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; display:block; }
.hbadge { background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.25); padding:7px 16px; border-radius:50px; font-size:.78rem; }

/* HERO */
.hero { background:linear-gradient(135deg,var(--gd) 0%,var(--gm) 60%,var(--gl) 100%); padding:52px 20px 60px; text-align:center; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; top:-60px; right:-60px; width:260px; height:260px; background:rgba(255,255,255,.05); border-radius:50%; }
.hero-tag { display:inline-block; background:rgba(0,200,83,.2); color:var(--ga); border:1px solid rgba(0,200,83,.4); padding:6px 20px; border-radius:50px; font-size:.78rem; font-weight:700; margin-bottom:18px; letter-spacing:1px; }
.hero h2 { color:#fff; font-size:clamp(1.7rem,5vw,2.7rem); font-weight:800; line-height:1.3; margin-bottom:14px; }
.hero h2 span { color:var(--ga); }
.hero p { color:rgba(255,255,255,.8); font-size:.95rem; max-width:500px; margin:0 auto; line-height:1.7; }

/* FILTER */
.fbar { background:#fff; border-bottom:1px solid #e0ece5; position:sticky; top:81px; z-index:90; }
.fi { max-width:1100px; margin:0 auto; padding:12px 18px; display:flex; gap:9px; overflow-x:auto; scrollbar-width:none; }
.fi::-webkit-scrollbar { display:none; }
.fb { background:var(--gp); color:var(--gd); border:1.5px solid #c5e4d0; padding:8px 20px; border-radius:50px; font-size:.82rem; font-weight:700; cursor:pointer; white-space:nowrap; transition:all .2s; font-family:'Vazirmatn',Tahoma,sans-serif; }
.fb:hover, .fb.active { background:var(--gd); color:#fff; border-color:var(--gd); }

/* MENU */
.ms { max-width:1100px; margin:0 auto; padding:36px 18px 80px; }
.st { font-size:1.2rem; font-weight:700; color:var(--gd); margin-bottom:24px; display:flex; align-items:center; gap:10px; }
.st::after { content:''; flex:1; height:2px; background:linear-gradient(to left,transparent,var(--gp)); }
.mg { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:22px; }

/* CARD */
.fc { background:#fff; border-radius:var(--r); overflow:hidden; box-shadow:var(--sh); transition:transform .3s,box-shadow .3s; border:1px solid rgba(26,94,53,.07); }
.fc:hover { transform:translateY(-5px); box-shadow:var(--shl); }
.ci { width:100%; height:210px; background:linear-gradient(135deg,#c8e6d4,#a8d5b5); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.ci .ep { font-size:80px; line-height:1; }
.ci img { width:100%; height:100%; object-fit:cover; display:block; }
.cb-badge { position:absolute; top:13px; right:13px; background:var(--gd); color:#fff; padding:5px 13px; border-radius:50px; font-size:.7rem; font-weight:700; }
.cb { padding:20px; }
.ct { font-size:1.1rem; font-weight:800; color:var(--td); margin-bottom:7px; }
.cd { font-size:.8rem; color:var(--tl); line-height:1.65; margin-bottom:16px; min-height:44px; }
.mac { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; background:var(--gp); border-radius:var(--rs); padding:11px 8px; margin-bottom:16px; }
.mi { text-align:center; }
.mv { font-size:1rem; font-weight:800; color:var(--gd); display:block; line-height:1.1; }
.ml { font-size:.65rem; color:var(--tl); font-weight:600; margin-top:2px; display:block; }
.cfoot { display:flex; align-items:center; justify-content:space-between; padding-top:14px; border-top:1px solid var(--gp); }
.cp { font-size:1.1rem; font-weight:800; color:var(--gd); }
.cp small { font-size:.68rem; font-weight:500; color:var(--tl); }
.ob { background:var(--gp); color:var(--gd); border:1.5px solid #b8ddc6; padding:7px 18px; border-radius:50px; font-size:.78rem; font-weight:700; }
.fc.hidden { display:none; }

/* FOOTER */
footer { background:var(--gd); color:rgba(255,255,255,.75); text-align:center; padding:28px 20px; font-size:.83rem; line-height:2; }
footer strong { color:#fff; }
footer a { color:var(--ga); text-decoration:none; }

@media(max-width:640px) { .mg { grid-template-columns:1fr; } .hero { padding:38px 16px 46px; } .ci { height:195px; } }
</style>
</head>
<body>
<header>
  <div class="hi">
    <div class="logo">
      <div class="logo-icon">🥗</div>
      <div>
        <h1>مهراد فیت فود</h1>
        <span>Mehrad Fit Food</span>
      </div>
    </div>
    <div class="hbadge">🔥 غذای سالم · رژیمی</div>
  </div>
</header>

<div class="hero">
  <div class="hero-tag">✨ تازه · طبیعی · رژیمی</div>
  <h2>غذای <span>سالم</span> که لذیذه!</h2>
  <p>منوی کامل رژیمی با اطلاعات دقیق کالری، پروتئین و ارزش غذایی — برای زندگی سالم‌تر</p>
</div>

<div class="fbar">
  <div class="fi">
    <button class="fb active" onclick="fil(this,'all')">همه</button>
    <button class="fb" onclick="fil(this,'برنج')">🍚 برنج و کته</button>
    <button class="fb" onclick="fil(this,'سالاد')">🥗 سالاد</button>
    <button class="fb" onclick="fil(this,'ماکارانی')">🍝 ماکارانی</button>
    <button class="fb" onclick="fil(this,'برگر')">🍔 برگر</button>
    <button class="fb" onclick="fil(this,'پیشنهاد')">⭐ پیشنهاد ویژه</button>
    <button class="fb" onclick="fil(this,'پروتئین')">💪 پروتئین</button>
  </div>
</div>

<div class="ms">
  <div class="st">منوی ما</div>
  <div class="mg" id="mg"></div>
</div>

<footer>
  <strong>مهراد فیت فود | Mehrad Fit Food</strong><br>
  غذای رژیمی سالم و طبیعی<br>
  <a href="admin.html">🔐 پنل مدیریت</a>
</footer>

<script>
const FOODS = [
  {id:1,name:"کته مرغ",cat:"برنج",e:"🍚",desc:"۲۵۰ گرم کته سبزی + ۲۲۰ گرم مرغ زمزه\u200cدار شده زعفرانی + دورچین (زیتون · لیمو · جعفری) + سس انار دون",cal:480,p:42,c:55,f:10,price:0},
  {id:2,name:"کته میتبال",cat:"برنج",e:"🍚",desc:"۲۵۰ گرم کته سبزی + ۱۷۰ گرم گوشت خالص بدون چربی مزه\u200cدار شده + دورچین (زیتون · لیمو · جعفری · خیارشور)",cal:460,p:38,c:52,f:9,price:0},
  {id:3,name:"کته ماهی",cat:"برنج",e:"🐟",desc:"۲۵۰ گرم کته سبزی + ماهی تازه مزه\u200cدار شده + دورچین ویژه",cal:420,p:40,c:50,f:7,price:0},
  {id:4,name:"سالاد مرغ",cat:"سالاد",e:"🥗",desc:"کاهو + بروکلی + گل کلم + قارچ + زیتون + ۱۵۰ گرم مرغ مزه\u200cدار شده + سس مخصوص رژیمی + نان تست ۷غله ۱ اسلایس",cal:310,p:35,c:18,f:8,price:0},
  {id:5,name:"سالاد گوشت",cat:"سالاد",e:"🥗",desc:"کاهو + بروکلی + گل کلم + قارچ + زیتون + ۱۵۰ گرم گوشت مزه\u200cدار شده + سس مخصوص رژیمی + نان تست ۷غله ۱ اسلایس",cal:340,p:33,c:20,f:10,price:0},
  {id:6,name:"سالاد فصل",cat:"سالاد",e:"🥬",desc:"کاهو + کلم قرمز + خیار + گوجه + زیتون + لیمو",cal:90,p:3,c:12,f:3,price:0},
  {id:7,name:"ماکارانی گوشت",cat:"ماکارانی",e:"🍝",desc:"۳۰۰ گرم ماکارانی با روغن زیتون + ۱۵۰ گرم گوشت مزه\u200cدار شده + پوره گوجه و ادویه دورچین",cal:520,p:36,c:65,f:12,price:0},
  {id:8,name:"برگر گوشت",cat:"برگر",e:"🍔",desc:"۲۰۰ گرم گوشت مزه\u200cدار شده بدون چربی + کاهو + گوجه + خیارشور + سس مخصوص با نان روگن رژیمی",cal:430,p:40,c:30,f:11,price:0},
  {id:9,name:"برگر مرغ",cat:"برگر",e:"🍗",desc:"۲۰۰ گرم فیله مرغ تازه + کاهو + گوجه + خیارشور + سس مخصوص با نان رژیمی روگن",cal:380,p:44,c:28,f:7,price:0},
  {id:10,name:"سیب\u200cزمینی تنوری",cat:"پیشنهاد",e:"🥔",desc:"۲۰۰ گرم سیب\u200cزمینی هواپز شده به همراه دورچین ویژه",cal:200,p:4,c:44,f:1,price:0},
  {id:11,name:"پوره سیب\u200cزمینی",cat:"پیشنهاد",e:"🥣",desc:"۲۰۰ گرم پوره سیب\u200cزمینی با شیر زیرو به همراه دورچین",cal:190,p:5,c:40,f:1,price:0},
  {id:12,name:"قارچ تنوری",cat:"پیشنهاد",e:"🍄",desc:"۲۰۰ گرم قارچ مزه\u200cدار شده به همراه دورچین",cal:70,p:6,c:8,f:2,price:0},
  {id:13,name:"تخم مرغ",cat:"پروتئین",e:"🥚",desc:"به تعداد دلخواه به همراه دورچین",cal:155,p:13,c:1,f:11,price:0},
  {id:14,name:"پرو ماست",cat:"پروتئین",e:"🥛",desc:"۱۲۰ گرم ماست پرو",cal:90,p:15,c:5,f:1,price:0},
  {id:15,name:"پروتئین بار",cat:"پروتئین",e:"💪",desc:"مغز گردو + مغز بادام زمینی + مغز تخم آفتاب\u200cگردان + شیره شاتوت",cal:280,p:12,c:22,f:18,price:0}
];

function priceHtml(price){
  if(!price||price===0) return '<span style="color:#bbb;font-size:.75rem">تماس بگیرید</span>';
  return price.toLocaleString('fa-IR')+' <small>تومان</small>';
}

function render(filter){
  const list = filter==='all' ? FOODS : FOODS.filter(f=>f.cat===filter);
  const mg = document.getElementById('mg');
  mg.innerHTML = '';
  list.forEach(food=>{
    const d = document.createElement('div');
    d.className = 'fc';
    d.innerHTML = `
      <div class="ci">
        <div class="ep">${food.e}</div>
        <div class="cb-badge">${food.cat}</div>
      </div>
      <div class="cb">
        <div class="ct">${food.name}</div>
        <div class="cd">${food.desc}</div>
        <div class="mac">
          <div class="mi"><span class="mv">${food.cal}</span><span class="ml">کالری</span></div>
          <div class="mi"><span class="mv">${food.p}g</span><span class="ml">پروتئین</span></div>
          <div class="mi"><span class="mv">${food.c}g</span><span class="ml">کربوهیدرات</span></div>
          <div class="mi"><span class="mv">${food.f}g</span><span class="ml">چربی</span></div>
        </div>
        <div class="cfoot">
          <div class="cp">${priceHtml(food.price)}</div>
          <div class="ob">سفارش تلفنی 📞</div>
        </div>
      </div>`;
    mg.appendChild(d);
  });
}

function fil(btn,cat){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(cat);
}

render('all');
</script>
</body>
</html>
